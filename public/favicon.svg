<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" fill="#06B6D4"/>
  
  <!-- Outer ring gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Center circle with gradient -->
  <circle cx="90" cy="90" r="75" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Inner white badge -->
  <circle cx="90" cy="90" r="65" fill="white" opacity="0.95"/>
  
  <!-- Data/Network symbol - stylized -->
  <g transform="translate(90, 90)">
    <!-- Overlapping connection nodes -->
    <circle cx="-20" cy="-15" r="12" fill="#06B6D4" opacity="0.9"/>
    <circle cx="20" cy="-15" r="12" fill="#3B82F6" opacity="0.9"/>
    <circle cx="0" cy="25" r="12" fill="#8B5CF6" opacity="0.9"/>
    
    <!-- Connection lines -->
    <line x1="-20" y1="-15" x2="0" y2="25" stroke="#06B6D4" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="-15" x2="0" y2="25" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#8B5CF6" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Subtle pattern -->
  <rect width="180" height="180" fill="url(#grad1)" opacity="0.05"/>
</svg>